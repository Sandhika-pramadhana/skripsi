services:
  nextjs:
    container_name: dashboard-posfin
    image: 117.102.70.147/dashboard-posfin:v1
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_API_URL_SANDBOX=${NEXT_PUBLIC_API_URL_SANDBOX}
      - NEXT_PUBLIC_X_API_TOKEN=${NEXT_PUBLIC_X_API_TOKEN}
      - NEXT_PUBLIC_SECRET=${NEXT_PUBLIC_SECRET}
      - NEXT_PUBLIC_JWT_SECRET=${NEXT_PUBLIC_JWT_SECRET}
      - GOOGLE_CLIENT_EMAIL=${GOOGLE_CLIENT_EMAIL}
      - GOOGLE_PRIVATE_KEY=${GOOGLE_PRIVATE_KEY}
      - GOOGLE_SHEET_ID=${GOOGLE_SHEET_ID}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    restart: always
